# Approach: wrap the PWA as a TWA (Trusted Web Activity) via Bubblewrap,
# pointing at the deployed Vercel URL. The web app itself stays the source
# of truth; the APK is just a thin Android shell.

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Deployed PWA URL to wrap (e.g. https://foolab.vercel.app)'
        required: true
        default: 'https://foolab.vercel.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

